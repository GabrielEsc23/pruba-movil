<ion-header>
  <ion-toolbar>
    <ion-title>
      Perfil
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>

    <ion-card-content>

      <h2>
        Usuario:
      </h2>

      <p>
        {{ email }}
      </p>

      <br>

      <ion-button
        expand="block"
        color="danger"
        (click)="logout()">

        Cerrar sesión

      </ion-button>

    </ion-card-content>

  </ion-card>

</ion-content>
